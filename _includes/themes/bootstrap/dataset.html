
<!-- Post content+sidebar -->

<style>
#post h1, #post h2, #post h3, #post h4, #post h5, #post h6 { color: #000; }
#post .datacon .col-md-9 { text-align: justify; }
</style>

<div class="mb-60"></div>

  <!-- Blog content + sidebar -->

  <section id="post" class="blog">

    <div class="container">
<div class="mb-20">

           {{ content }}

        </div>
