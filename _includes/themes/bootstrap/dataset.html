
<!-- Post content+sidebar -->

<style>
#post h1, #post h2, #post h3, #post h4, #post h5, #post h6 { color: #000; }
#post .datacon .col-md-9 { text-align: justify; }

/* Style kramdown-generated tables within dataset pages */
#post .datacon table {
  width: 100%;
  margin-bottom: 1.5rem;
  border-collapse: collapse;
  font-size: 0.9rem;
}
#post .datacon table thead th {
  background-color: #fde0d0;
  color: #000;
  font-weight: 600;
  padding: 10px 12px;
  border: 1px solid #dee2e6;
  text-align: left;
}
#post .datacon table tbody td {
  padding: 8px 12px;
  border: 1px solid #dee2e6;
  text-align: left;
  color: #444;
}
#post .datacon table tbody tr:nth-child(even) {
  background-color: #f8f9fa;
}
#post .datacon table tbody tr:hover {
  background-color: #e9ecef;
}
#post .datacon .col-md-9 {
  overflow-x: auto;
}
</style>

<div class="mb-60"></div>

  <!-- Blog content + sidebar -->

  <section id="post" class="blog">

    <div class="container">
<div class="mb-20">
  <a href="{{ BASE_PATH }}/datasets.html" class="btn btn-outline-secondary btn-sm">
    <i class="fa fa-arrow-left"></i> Back to Datasets
  </a>
</div>
<h1 class="title">{{page.title}}</h1>
<div class="mb-60"></div>
      <div class="datacon row">
        <div class="col-sm-12 col-md-9">
          {% if page.summary %}
          <div class="dataset-summary" style="background-color: #f8f9fa; padding: 1rem; border-left: 4px solid #ff6b35; margin-bottom: 2rem;">
            <p style="margin-bottom: 0; font-size: 1rem; line-height: 1.6;">{{ page.summary }}</p>
          </div>
          {% endif %}
           {{ content }}
          <div class="mb-60"></div>
          <div class="mb-60"></div>
        </div>
        <div class="col-sm-12 col-md-3">
          {% include side-bar.html %}
        </div>
      </div>
     </div>
   </section>
