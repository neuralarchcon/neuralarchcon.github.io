              <ul class="social-links">
                {% if site.author.facebook %}
                <li>
                  <a href="https://www.facebook.com/{{ site.author.facebook }}/" aria-label="Facebook" class="fa fa-facebook"><span class="sr-only">Facebook</span></a>
                </li>
                {% endif %}
                {% if site.author.twitter %}
                <li>
                  <a href="https://twitter.com/{{ site.author.twitter }}" aria-label="Twitter" class="fa fa-twitter"><span class="sr-only">Twitter</span></a>
                </li>
                {% endif %}
                {% if site.author.instagram %}
                <li>
                  <a href="https://instagram.com/{{ site.author.instagram }}" aria-label="Instagram" class="fa fa-instagram"><span class="sr-only">Instagram</span></a>
                </li>
                {% endif %}
                {% if site.author.linkedin %}
                <li>
                  <a href="https://www.linkedin.com/in/{{ site.author.linkedin }}/" aria-label="LinkedIn" class="fa fa-linkedin"><span class="sr-only">LinkedIn</span></a>
                </li>
                {% endif %}
              </ul>
